<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anketa – Záložky{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <div class="container">
            <a href="{{ url_for('index') }}" class="site-title">
                <span class="dot"></span>
                Záložková anketa
            </a>
            <nav>
                <a href="{{ url_for('index') }}">Hlasovat</a>
                <a href="{{ url_for('results') }}">Výsledky</a>
                <a href="{{ url_for('about') }}">O anketě</a>
                <a href="{{ url_for('reset') }}">Reset</a>
            </nav>
        </div>
    </header>

    <main class="container">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            Školní projekt &middot; Flask &amp; SQLite &middot; 2024
        </div>
    </footer>

</body>
</html>
